name: Build and deploy Python project to Azure Function App - funstorpocomar

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' 
  PYTHON_VERSION: '3.13' 

jobs:
  build-and-deploy:
    runs-on: self-hosted  # Ensures execution happens entirely inside your private VNet
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Cleans out any stale local build artifacts to guarantee a clean deployment
      - name: Clean and Install dependencies into .python_packages
        run: |
          rm -rf .python_packages
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt --target="./.python_packages/lib/site-packages"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          use-managed-identity: true
          tenant-id: ${{ secrets.__tenantidsecretname__ }}
          subscription-id: ${{ secrets.__subscriptionidsecretname__ }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'funstorpocomar'
          slot-name: 'Production'
          # Passing '.' lets the Azure action package the local folder structure natively
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false