name: Build and deploy Python project to Azure Function App - funstorpocomar

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' 
  PYTHON_VERSION: '3.13' 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # --only-binary=:all: forces pip to fetch pre-compiled universal Linux wheels 
      # suitable for the Azure host, preventing local compilation mismatches.
      - name: Clean and install dependencies into .python_packages
        run: |
          rm -rf .python_packages
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt --target="./.python_packages/lib/site-packages" --only-binary=:all:

      # Create a dedicated, clean artifact directory to avoid tracking zip anomalies
      - name: Prepare artifact payload
        run: |
          mkdir -p deploy_payload
          cp -r .python_packages host.json requirements.txt function_app.py deploy_payload/
          # If you have blueprints, utility folders, or local modules, copy them here too:
          # cp -r your_helper_modules/ deploy_payload/ 2>/dev/null || true

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy_payload/

  deploy:
    runs-on: self-hosted
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      # Clear any stale deployment files left in the self-hosted runner workspace
      - name: Clean runner workspace
        run: |
          rm -rf ./* .* 2>/dev/null || true

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          auth-type: IDENTITY
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4517B4A97E2C409285BDA376C0F9AA75 }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'funstorpocomar'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false